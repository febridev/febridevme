name: Build and Deploy Tailwind to Pages

# Kapan aksi ini dijalankan?
on:
  push:
    branches: ["main"] # Jalankan setiap ada kode baru yang di-push ke branch 'main'
  workflow_dispatch: # Memungkinkan tombol 'jalankan manual' di dashboard GitHub

# Izin yang dibutuhkan GitHub untuk mengubah halaman Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Mencegah penumpukan proses jika Anda push berkali-kali dengan cepat
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Menggunakan Node.js versi 20 yang stabil
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Tailwind CSS
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public' # Mengambil folder public yang sudah berisi CSS hasil build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
